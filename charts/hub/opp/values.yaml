---
# DR pair cluster names - same structure as rdr chart (regionalDR).
# Override via values-hub or overrides so opp-policy and rdr use the same names.
regionalDR:
  - name: resilient
    clusters:
      primary:
        name: ocp-primary
      secondary:
        name: ocp-secondary

argocdHealthMonitor:
  enabled: true
  # When remediating a wedged cluster, force-sync these resources in the Application (instead of restarting Argo CD)
  forceSyncAppNamespace: openshift-gitops
  forceSyncAppName: ramendr-starter-kit-resilient
  # List of resources to force-sync (kind + name). First should be the imperative Namespace (exists in any validated pattern).
  # Additional namespaces can be taken from values-<clusterGroup>.yaml (clusterGroup.namespaces) at deploy time.
  forceSyncResources:
    - kind: Namespace
      name: ramendr-starter-kit-resilient
    # Example: add more Namespace resources from values-<clusterGroup>.yaml clusterGroup.namespaces
    # - kind: Namespace
    #   name: gitops-vms
    # - kind: Namespace
    #   name: openshift-cnv
  # Legacy single-resource defaults (used only if forceSyncResources is empty)
  forceSyncResourceKind: Namespace
  forceSyncResourceName: ramendr-starter-kit-resilient
